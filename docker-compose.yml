services:
  app:
    image: ghcr.io/agentgg00/server-dashboard:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app