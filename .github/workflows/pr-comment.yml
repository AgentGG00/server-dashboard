name: PR Comment

on:
  workflow_run:
    workflows: ["Review"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.get_pr.outputs.pr_number }}
      run_id: ${{ steps.get_pr.outputs.run_id }}
    steps:
      - name: PR Nummer und Run ID auslesen
        id: get_pr
        run: |
          echo "pr_number=${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT

  comment:
    needs: prepare
    uses: AgentGG00/workflows/.github/workflows/pr-comment.yml@main
    with:
      pr_number: ${{ fromJson(needs.prepare.outputs.pr_number) }}
      run_id: ${{ fromJson(needs.prepare.outputs.run_id) }}
    secrets: inherit
