name: PR Comment

on:
  workflow_run:
    workflows: ["Review"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Struktur Artifact laden
        uses: actions/download-artifact@v4
        with:
          name: review-struktur
          path: review-result
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Secrets Artifact laden
        uses: actions/download-artifact@v4
        with:
          name: review-secrets
          path: review-result
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: PR Comment schreiben
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const struktur = fs.readFileSync('review-result/struktur.txt', 'utf8').trim();
            const secrets = fs.readFileSync('review-result/secrets.txt', 'utf8').trim();

            const icon = (r) => r === 'success' ? '✅' : '❌';

            const body = `## Review Ergebnis

            | Check | Status |
            |---|---|
            | Struktur | ${icon(struktur)} |
            | Secrets Scan | ${icon(secrets)} |

            ${struktur === 'failure' ? '> ⚠️ Pflichtdateien fehlen – siehe Job-Log für Details.' : ''}
            ${secrets === 'failure' ? '> 🔐 Mögliche Secrets gefunden – siehe Gitleaks Job-Log.' : ''}
            `;

            const pr_number = ${{ github.event.workflow_run.pull_requests[0].number }};

            github.rest.issues.createComment({
              issue_number: pr_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
