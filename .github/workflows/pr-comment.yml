name: PR Comment

on:
  workflow_run:
    workflows: ["Review"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    uses: AgentGG00/workflows/.github/workflows/pr-comment.yml@main
    with:
      pr_number: ${{ github.event.workflow_run.pull_requests[0].number }}
    secrets: inherit
