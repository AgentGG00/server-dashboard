events {}

http {
    server {
        listen 80;
        server_name dashboard.framenode.net;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name dashboard.framenode.net;

        ssl_certificate /etc/letsencrypt/live/dashboard.framenode.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.framenode.net/privkey.pem;

        allow 100.64.0.0/10;
        deny all;

        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}